version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    image: api-devops:latest
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    
    # buenas practicas: limitar recursos y healthcheck a nivel de orquestador
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s