name: CI-CD Pipeline DevOps E2E

on:
  push:
    branches:
      - main # Se dispara cuando hacés push a la rama principal

jobs:
  # PASO 1: VALIDACIÓN (TESTS)
  test:
    name: Pruebas Unitarias (Pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Caché de pip para acelerar subsecuentes ejecuciones
      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ejecutar Pytest
        run: pytest tests/ -v

  # PASO 2: EMPAQUETADO Y SEGURIDAD (DOCKER + TRIVY)
  build_and_push:
    name: Build, Scan y Push (SemVer)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construimos la imagen local para el escaneo de seguridad
      - name: Build local para Scan
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: api-test:local

      # ESCANEO CON TRIVY
      - name: Escaneo de Vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api-test:local'
          format: 'table'
          exit-code: '1' # Si encuentra algo CRÍTICO, frena el pipeline
          severity: 'CRITICAL'

      # Si Trivy pasa, subimos a Docker Hub con VERSIONADO SEMÁNTICO e inmutable
      - name: Build y Push Versionado
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-api:v1.0.${{ github.run_number }}

  # PASO 3: DESPLIEGUE ACTIVO (RENDER)
  deploy:
    name: Deploy Activo en Render
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy Hook
        # Este comando le avisa a Render que ya puede descargar y desplegar la nueva imagen
        run: curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
