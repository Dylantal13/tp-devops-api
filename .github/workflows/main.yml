name: CI-CD Pipeline DevOps E2E

on:
  push:
    branches:
      - main # se dispara al hacer push en main
  pull_request:
    branches:
      - main # se dispara al abrir un PR contra main (flujo de mergeo)

jobs:
  # etapa de testeo: corre siempre (push y pull requests)
  test:
    name: Pruebas Unitarias (Pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # cache para apurar las dependencias
          
      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Ejecutar Pytest
        run: pytest tests/ -v

  # etapa de construccion: solo corre tras confirmarse el merge (push en main)
  build_and_push:
    name: Build, Scan y Push (SemVer)
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # imagen local temporal para escanear
      - name: Build local para Scan
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: api-test:local

      # analisis de vulnerabilidades
      - name: Escaneo de Vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api-test:local'
          format: 'table'
          exit-code: '0' # reportamos criticos pero sin romper la build por temas de la imagen base
          severity: 'CRITICAL'

      # si todo esta ok, subimos a docker hub con tags latest y semver
      - name: Build y Push Versionado
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-devops:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api-devops:v1.0.${{ github.run_number }}

  # disparo del despliegue en render: solo si es push en main
  deploy:
    name: Deploy Activo en Render
    needs: build_and_push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy Hook
        # llamamos al webhook de render para forzar la actualizacion de la imagen
        run: curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
