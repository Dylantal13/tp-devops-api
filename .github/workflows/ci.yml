name: CI - Pruebas Unitarias

# Esto le dice a GitHub cuándo correr esta acción
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest # Corre en una máquina virtual de Linux gratis de GitHub

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip" # Guarda en caché las librerías para que sea más rápido

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar pruebas (Pytest)
      run: |
        pytest tests/ -v